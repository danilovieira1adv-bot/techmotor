services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: techmotor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/techmotor
      NODE_ENV: production
      PORT: 5000
      OPENAI_API_KEY: "sk-placeholder"
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - ./shared:/app/shared

volumes:
  postgres_data: